upstream chat_servers {
    # ip_hash ensures the same user always hits the same server
    # This is important for Socket.IO connection stability
    ip_hash;

    # Docker Compose will resolve 'chat-server' to all scaled instances
    server chat-server:3000;
}

server {
    listen 80;

    # Serve the chat application
    location / {
        proxy_pass http://chat_servers;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket upgrade headers — CRITICAL for Socket.IO
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for long-lived WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Socket.IO specific path
    location /socket.io/ {
        proxy_pass http://chat_servers;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
